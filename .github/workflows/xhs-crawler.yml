name: XHS Crawler Worker

on:
  schedule:
    - cron: "0 2 */3 * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Crawler mode"
        required: true
        default: "live-public"
        type: choice
        options:
          - live-public
          - fixture
          - dry-run

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.26.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Run crawler
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: pnpm exec tsx workers/xhs-crawler/index.ts --mode=${{ github.event.inputs.mode || 'live-public' }}
